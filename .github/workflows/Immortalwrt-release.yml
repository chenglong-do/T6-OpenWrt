name: Immortalwrt release

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:

  build:

    runs-on: ubuntu-22.04
    if: github.repository_owner_id == github.event.sender.id || github.event_name == 'schedule'

    steps:
      - name: Before freeing up disk space
        run: |
          echo "Before freeing up disk space"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="
  
      - name: "Optimize Disk Space"
        uses: "hugoalh/disk-space-optimizer-ghaction@v0.8.1"
        with:
          operate_sudo: "True"
          general_include: ".+"
          general_exclude: |-
            ^GCC$
            ^G\+\+$
            Clang
            LLVM
          docker_include: ".+"
          docker_prune: "True"
          docker_clean: "True"
          apt_prune: "True"
          apt_clean: "True"
          homebrew_prune: "True"
          homebrew_clean: "True"
          npm_prune: "True"
          npm_clean: "True"
          os_swap: "True"
  
      - name: Init build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -y -qq install build-essential rsync asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch python3 python2.7 unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libreadline-dev libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler g++-multilib antlr3 gperf wget ccache curl swig coreutils vim nano python3 python3-pip python3-ply haveged lrzsz scons libpython3-dev
          sudo -H -E pip3 install --no-cache-dir pyelftools
          purge_list="$(dpkg-query -W -f='${binary:Package} ' 'azure-cli' 'ghc*' 'zulu*' 'hhvm' 'llvm*' 'firefox' 'powershell' 'openjdk*' 'dotnet*' 'google*' 'mysql*' 'php*' 'android*' 'rename' 'speedtest-cli' 2>/dev/null || true)"
          if [ -n "$purge_list" ]; then sudo -E apt-get -qq purge $purge_list; fi
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo -E git config --global user.name 'GitHub Actions' && git config --global user.email 'noreply@github.com'
          sudo timedatectl set-timezone "$TZ"

      - name: Freeing up disk space
        uses: easimon/maximize-build-space@master
        with: 
          root-reserve-mb: 3072
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
  
      - name: Free up disk space complete
        run: |
          echo "Free up disk space complete"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      - name: Checkout
        uses: actions/checkout@main
      
      - name: Prepare Sources
        id: prepare
        run: |
          sudo chown -R runner:runner /home/runner/work/T6-OpenWrt
          latest_release="openwrt-25.12"
          git clone -b ${latest_release} --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt
          echo "latest_release=${latest_release}" >>$GITHUB_ENV
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          cd ..
      
      - name: Cache Toolchain
        if: env.CACHE_TOOLCHAIN == 'true'
        uses: HiGarfield/cachewrtbuild@main
        with:
          ccache: false
          mixkey: immortalwrt-2512-rk3588-t6
          prefix: ${{ env.OPENWRT_PATH }}

      
      - name: Prepare Package
        run: |
          cd openwrt
          cp -f ../scripts/prepare_package.sh ./prepare_package.sh
          /bin/bash prepare_package.sh
      
      - name: Make Config
        run: |
          cd openwrt
          mv ../config/config-immortalwrt-release.config .config
          sed -i '/CONFIG_TARGET_ROOTFS_SQUASHFS/d' .config
          make defconfig
      
      - name: Make Download
        run: |
          df -h
          cd openwrt
          make download -j$(nproc)
      
      - name: Compile Openwrt
        id: compileopenwrt
        continue-on-error: true
        run: |
          df -h
          cd openwrt
          make -j$(($(nproc) + 1))

      - name: If Error
        if: steps.compileopenwrt.outcome == 'failure'
        run: |
          cat openwrt/.config
          echo '================================================================'
          cd openwrt
          # Rebuild in single-job verbose mode to expose the first real failure.
          make -j1 V=s 2>&1 | tee ../openwrt-build-error.log
          exit ${PIPESTATUS[0]}

      - name: Upload build error log
        if: steps.compileopenwrt.outcome == 'failure'
        uses: actions/upload-artifact@main
        with:
          name: openwrt-build-error-log
          path: ./openwrt-build-error.log

      - name: Print Disk Space After
        run: df -h
      
      - name: Assemble Artifact
        id: assemble_artifact
        run: |
          rm -rf ./artifact/
          mkdir -p ./artifact/
          mv openwrt/bin/targets/rockchip/armv8/*sysupgrade.img* ./artifact/
          cd ./artifact/
          gzip -d *.gz && exit 0
          gzip *.img
          releaseTag=${{ env.latest_release }}
          sha256sum *.gz | tee T6-OPENWRT-$releaseTag-$(date +%Y-%m-%d).sha256sum
          mv *t6*ext4* ./T6-OPENWRT-$releaseTag-$(date +%Y-%m-%d)-ext4.img.gz
          mv *t6*squashfs* ./T6-OPENWRT-$releaseTag-$(date +%Y-%m-%d)-sfs.img.gz
          cd ../openwrt
          cp .config ../artifact/config-full.seed
          ./scripts/diffconfig.sh > ../artifact/config-diff.seed
          release_tag="T6-OPENWRT-$releaseTag-$(date +%Y-%m-%d)"
          echo "release_tag=${release_tag}" >>$GITHUB_ENV
      
      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ env.release_tag }}-artifact
          path: ./artifact/
      
      - name: Create release
        id: create_release
        uses: ncipollo/release-action@main
        with:
          name: ${{ env.release_tag }}-ROM
          allowUpdates: true
          tag: ${{ env.release_tag }}
          commit: master
          replacesArtifacts: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ./artifact/*.gz,./artifact/*.seed,./artifact/*.sha256sum
